services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb-telemetry
    ports:
      - "5432:5432"
    shm_size: '512mb'
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-telemetry_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telemetry_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telemetry_user} -d ${POSTGRES_DB:-telemetry}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

volumes:
  timescale-data:
