name: 'ecommerce_analytics'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_analytics'

model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

vars:
  truncate_timestamp_minutes: 60
  active_customer_lookback_days: 90

seeds:
  ecommerce_analytics:
    +schema: raw
    customers:
      +column_types:
        customer_id: integer
        signup_date: date
    products:
      +column_types:
        product_id: integer
        list_price_cents: integer
    orders:
      +column_types:
        order_id: integer
        customer_id: integer
        order_at: timestamp
    order_items:
      +column_types:
        order_item_id: integer
        order_id: integer
        product_id: integer
        unit_price_cents: integer
        quantity: integer

models:
  ecommerce_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

snapshots:
  ecommerce_analytics:
    +target_schema: snapshots
    +strategy: timestamp
