services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse-realtime
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./config/users.xml:/etc/clickhouse-server/users.d/custom-users.xml:ro
      - ./config/server-settings.xml:/etc/clickhouse-server/config.d/server-settings.xml:ro
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-realtime}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-metrics_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-metrics_password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

volumes:
  clickhouse-data:
  clickhouse-logs:
