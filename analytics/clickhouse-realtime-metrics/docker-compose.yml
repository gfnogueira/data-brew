services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse-realtime
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./config/users.xml:/etc/clickhouse-server/users.d/custom-users.xml:ro
      - ./config/server-settings.xml:/etc/clickhouse-server/config.d/server-settings.xml:ro
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-realtime}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-metrics_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-metrics_password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana-realtime
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-metrics_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-metrics_password}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  clickhouse-data:
  clickhouse-logs:
  grafana-data:
