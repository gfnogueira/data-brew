apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse-realtime
    access: proxy
    isDefault: true
    jsonData:
      protocol: http
      host: clickhouse
      port: 8123
      defaultDatabase: realtime
      tlsSkipVerify: true
      username: ${CLICKHOUSE_USER}
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
    editable: true
