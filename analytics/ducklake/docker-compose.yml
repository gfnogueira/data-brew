services:
  catalog:
    image: postgres:16-alpine
    container_name: ducklake-catalog
    ports:
      - "${CATALOG_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${CATALOG_DB:-ducklake_catalog}
      POSTGRES_USER: ${CATALOG_USER:-ducklake}
      POSTGRES_PASSWORD: ${CATALOG_PASSWORD:-ducklake_password}
    volumes:
      - catalog-data:/var/lib/postgresql/data
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_USER:-ducklake} -d ${CATALOG_DB:-ducklake_catalog}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  storage:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: ducklake-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - storage-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  storage-init:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    container_name: ducklake-storage-init
    depends_on:
      storage:
        condition: service_healthy
    environment:
      STORAGE_BUCKET: ${STORAGE_BUCKET:-lakehouse}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://storage:9000 "$$STORAGE_ACCESS_KEY" "$$STORAGE_SECRET_KEY" &&
        mc mb --ignore-existing local/"$$STORAGE_BUCKET" &&
        mc anonymous set download local/"$$STORAGE_BUCKET" &&
        echo "Bucket $$STORAGE_BUCKET ready"
    restart: "no"

volumes:
  catalog-data:
  storage-data:
