version: 2

models:
  - name: mart_orders
    description: One row per order with status-aware revenue columns.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]

  - name: mart_channel_performance
    description: Channel-level revenue, refund share, and order counts.
    columns:
      - name: channel
        tests: [unique, not_null]
