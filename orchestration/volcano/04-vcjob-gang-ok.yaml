# Spark-style batch job that fits the cluster.
# Shape: 3 executor-equivalents, gang-scheduled.
# minAvailable equals total replicas: Volcano starts the job only when it
# can place ALL pods at once.
apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: daily-orders-rollup
  namespace: lakehouse-batch
spec:
  minAvailable: 3
  schedulerName: volcano
  queue: gold-tier
  policies:
    # Restart the whole job if any pod is evicted, keeping the gang intact.
    - event: PodEvicted
      action: RestartJob
  tasks:
    - replicas: 3
      name: spark-executor
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: spark-executor
              image: busybox:1.36
              command:
                - sh
                - -c
                # Stays Running so the pods can be inspected. Delete the job to stop.
                - "echo executor $HOSTNAME up; sleep infinity"
              resources:
                requests:
                  cpu: "200m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
