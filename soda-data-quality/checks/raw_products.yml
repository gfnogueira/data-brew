# SodaCL checks for raw.products
# Validates product catalog landing data

checks for products:
  - row_count > 0
  - row_count < 50000:
      name: Reasonable volume for raw products
  - schema:
      name: Detect schema drift
      warn:
        when required column missing: [product_id, product_name, category, unit_price, loaded_at]
  - missing_count(product_id) = 0
  - missing_count(product_name) = 0
  - duplicate_count(product_id) = 0
  - missing_count(unit_price) = 0
  - invalid_count(unit_price) = 0:
      valid min: 0
      valid max: 1000000
  - invalid_count(unit_cost) = 0:
      valid min: 0
      valid max: 1000000
  - invalid_count(is_active) = 0:
      valid values: [true, false]
