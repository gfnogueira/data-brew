services:
  postgres:
    image: postgres:15-alpine
    container_name: soda-postgres
    environment:
      POSTGRES_USER: soda_user
      POSTGRES_PASSWORD: soda_password
      POSTGRES_DB: soda_quality
    ports:
      - "5432:5432"
    volumes:
      - soda_pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soda_user -d soda_quality"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  soda_pgdata:
